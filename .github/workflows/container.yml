name: Docker Image CI

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: boozebot

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get tag name and check if semantic version
        id: prep
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "BUILD_VER=${TAG}" >> $GITHUB_OUTPUT
          if echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "IS_SEMVER=true" >> $GITHUB_OUTPUT
          else
            echo "IS_SEMVER=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.prep.outputs.BUILD_VER }}
            ${{ steps.prep.outputs.IS_SEMVER == 'true' && format('{0}/{1}:latest', secrets.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}
